<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经销商数据可视化</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center; /* 水平居中 */
            justify-content: center; /* 垂直居中 */
            min-height: 100vh; /* 确保内容垂直居中时占据整个视口高度 */
            margin: 0; /* 移除默认边距 */
        }
        h1, #plot-form, #message, #plot-container {
            max-width: 600px; /* 设置最大宽度 */
            width: 100%; /* 宽度适应父容器 */
            box-sizing: border-box; /* 包含padding和border在元素的总宽高之内 */
            text-align: center; /* 文本内容居中 */
        }
        #plot-form {
            padding: 20px;
            background-color: #f4f4f4;
            border-radius: 8px;
        }
        #plot-form label, #plot-form select, #plot-form button {
            display: block;
            width: 100%;
            margin-bottom: 10px;
        }
        #plot-form select {
            width: calc(100% - 22px); /* 考虑到浏览器默认的select样式可能需要微调宽度 */
        }
        #plot-container {
            position: relative;
            width: 100%;
            height: 400px; /* 固定高度 */
        }
        #plot {
            width: 100%;
            height: 100%;
        }
        #message {
            display: none; /* 默认隐藏 */
            color: red;
            font-size: 16px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>经销商数据可视化</h1>

    <form id="plot-form">
        <label for="dealer">选择经销商:</label>
        <select name="dealer" id="dealer">
            {% for dealer in dealers %}
                <option value="{{ dealer }}">{{ dealer }}</option>
            {% endfor %}
        </select>

        <label for="dimension">选择维度:</label>
        <select name="dimension" id="dimension">
            {% for dimension in dimensions %}
                <option value="{{ dimension }}">{{ dimension }}</option>
            {% endfor %}
        </select>

        <button type="submit">生成图表</button>
    </form>

    <!-- 消息显示区 -->
    <div id="message"></div>

    <!-- 图表容器 -->
    <div id="plot-container">
        <div id="plot"></div>
    </div>

    <script>
        document.getElementById('plot-form').onsubmit = function(event) {
            event.preventDefault(); // 阻止表单的默认提交行为

            // 获取用户选择的经销商和维度
            const dealer = document.getElementById('dealer').value;
            const dimension = document.getElementById('dimension').value;

            // 发起 POST 请求到后端
            fetch('/plot', {
                method: 'POST',
                body: new URLSearchParams({ dealer: dealer, dimension: dimension }),
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                }
            })
            .then(response => {
                // 检查 HTTP 响应状态码
                if (!response.ok) {
                    throw new Error(`HTTP 错误！状态码: ${response.status}`);
                }
                return response.json(); // 解析 JSON 数据
            })
            .then(data => {
                console.log('后端返回的数据:', data); // 打印后端返回的 JSON 数据

                const plotDiv = document.getElementById('plot');
                const messageDiv = document.getElementById('message');

                if (data.message) {
                    // 如果返回了错误消息，显示消息并隐藏图表
                    console.error('后端错误信息:', data.message);
                    messageDiv.innerText = data.message;
                    messageDiv.style.display = 'block';
                    plotDiv.style.display = 'none';
                } else {
                    // 如果返回了图表数据，隐藏消息并显示图表
                    console.log('传递给 Plotly 的数据:', data.data);
                    console.log('传递给 Plotly 的布局:', data.layout);

                    messageDiv.style.display = 'none';
                    plotDiv.style.display = 'block';

                    // 调用 Plotly 渲染图表
                    Plotly.newPlot(plotDiv, data.data, data.layout);
                }
            })
            .catch(error => {
                // 捕获任何错误并在控制台中打印
                console.error('请求或渲染过程中发生错误:', error);

                // 显示错误消息
                const messageDiv = document.getElementById('message');
                messageDiv.innerText = '请求或渲染图表时发生错误，请检查控制台日志。';
                messageDiv.style.display = 'block';
            });
        };
    </script>
</body>
</html>
