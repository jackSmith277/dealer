<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>汽车评论分析 Demo</title>
  <style>
    :root {
      --bg: #f3efe7;
      --panel: rgba(255, 252, 246, 0.92);
      --panel-strong: #fffaf2;
      --text: #1f2937;
      --muted: #6b7280;
      --line: rgba(31, 41, 55, 0.12);
      --brand: #cc5f3d;
      --brand-deep: #8e3d22;
      --accent: #e8c58f;
      --shadow: 0 18px 40px rgba(116, 67, 31, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(204, 95, 61, 0.22), transparent 28%),
        radial-gradient(circle at top right, rgba(232, 197, 143, 0.42), transparent 22%),
        linear-gradient(180deg, #f6f1e8 0%, #efe7d8 100%);
      min-height: 100vh;
    }

    .wrap {
      width: min(1100px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0 56px;
    }

    .hero {
      padding: 32px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(255, 250, 242, 0.95), rgba(248, 240, 225, 0.88));
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(30px, 4vw, 52px);
      line-height: 1.08;
      letter-spacing: 1px;
    }

    .sub {
      margin: 0;
      max-width: 760px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.8;
    }

    .panel {
      margin-top: 24px;
      padding: 24px;
      border-radius: 24px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    form {
      display: grid;
      grid-template-columns: 1fr 140px 140px;
      gap: 14px;
      align-items: end;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel-strong);
      font-size: 15px;
      outline: none;
    }

    input:focus {
      border-color: rgba(204, 95, 61, 0.5);
      box-shadow: 0 0 0 4px rgba(204, 95, 61, 0.12);
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 14px 18px;
      background: linear-gradient(135deg, var(--brand), var(--brand-deep));
      color: #fff;
      font-size: 15px;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      box-shadow: 0 12px 26px rgba(142, 61, 34, 0.24);
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.65;
      cursor: wait;
      transform: none;
    }

    .hint {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .status {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(232, 197, 143, 0.2);
      color: #7a4a21;
      display: none;
    }

    .result {
      display: none;
      margin-top: 26px;
      gap: 22px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .stat-card,
    .review-card,
    .report-card {
      border-radius: 20px;
      border: 1px solid var(--line);
      background: rgba(255, 251, 245, 0.92);
      box-shadow: var(--shadow);
    }

    .stat-card {
      padding: 18px;
    }

    .stat-label {
      color: var(--muted);
      font-size: 13px;
    }

    .stat-value {
      margin-top: 8px;
      font-size: 26px;
      font-weight: 700;
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 20px;
    }

    .reviews {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
    }

    .review-card {
      padding: 18px;
    }

    .review-meta {
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .review-content {
      font-size: 14px;
      line-height: 1.8;
      white-space: pre-wrap;
    }

    .report-card {
      padding: 22px;
      overflow-x: auto;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: Consolas, "Courier New", monospace;
      line-height: 1.7;
      font-size: 13px;
    }

    .file-list {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.8;
    }

    @media (max-width: 900px) {
      form {
        grid-template-columns: 1fr;
      }

      .wrap {
        width: min(100% - 20px, 1100px);
        padding-top: 24px;
      }

      .hero,
      .panel {
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>汽车评论抓取与分析</h1>
      <p class="sub">输入懂车帝等公开评论页 URL，后端会先爬取评论，再调用分析脚本生成完整报告。前端会展示部分评论预览，并返回完整 Markdown 报告和输出文件路径。</p>
    </section>

    <section class="panel">
      <form id="analyze-form">
        <div>
          <label for="url">评论页 URL</label>
          <input id="url" name="url" type="url" placeholder="https://www.dongchedi.com/auto/series/score/6187-x-x-x-x-x" required>
        </div>
        <div>
          <label for="max_items">最多评论数</label>
          <input id="max_items" name="max_items" type="number" min="1" max="100" value="20">
        </div>
        <div>
          <button id="submit-btn" type="submit">开始分析</button>
        </div>
      </form>
      <div class="hint">首次抓取可能需要几十秒，取决于页面加载速度和评论数量。</div>
      <div id="status" class="status"></div>
    </section>

    <section id="result" class="result">
      <div class="stats">
        <div class="stat-card">
          <div class="stat-label">抓取评论数</div>
          <div id="review-count" class="stat-value">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">分析目标 URL</div>
          <div id="result-url" class="stat-value" style="font-size:14px; line-height:1.7; font-weight:600;"></div>
        </div>
      </div>

      <div>
        <h2 class="section-title">评论预览</h2>
        <div id="reviews" class="reviews"></div>
      </div>

      <div>
        <h2 class="section-title">完整分析报告</h2>
        <div class="report-card">
          <pre id="report"></pre>
        </div>
        <div id="file-list" class="file-list"></div>
      </div>
    </section>
  </div>

  <script>
    const form = document.getElementById('analyze-form');
    const submitBtn = document.getElementById('submit-btn');
    const statusBox = document.getElementById('status');
    const resultBox = document.getElementById('result');
    const reviewCount = document.getElementById('review-count');
    const resultUrl = document.getElementById('result-url');
    const reviewsContainer = document.getElementById('reviews');
    const reportBox = document.getElementById('report');
    const fileList = document.getElementById('file-list');

    function setStatus(message, visible = true) {
      statusBox.textContent = message;
      statusBox.style.display = visible ? 'block' : 'none';
    }

    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      resultBox.style.display = 'none';
      reviewsContainer.innerHTML = '';
      reportBox.textContent = '';
      fileList.innerHTML = '';
      submitBtn.disabled = true;
      setStatus('后端正在抓取评论并生成报告，请稍等...');

      const payload = {
        url: document.getElementById('url').value.trim(),
        max_items: Number(document.getElementById('max_items').value || 20),
      };

      try {
        const response = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await response.json();

        if (!response.ok || !data.ok) {
          throw new Error(data.error || '分析失败');
        }

        reviewCount.textContent = String(data.review_count || 0);
        resultUrl.textContent = data.url || '';

        const cards = (data.preview_reviews || []).map((item) => `
          <article class="review-card">
            <div class="review-meta">
              车型：${escapeHtml(item.car_name || '未知')}<br>
              评分：${escapeHtml(item.rating || '未知')}<br>
              时间：${escapeHtml(item.published_at || '未知')}
            </div>
            <div class="review-content">${escapeHtml(item.content || '')}</div>
          </article>
        `).join('');
        reviewsContainer.innerHTML = cards || '<div class="review-card">没有可展示的评论预览。</div>';

        reportBox.textContent = data.report_markdown || '';
        fileList.innerHTML = `
          reviews.xlsx：${escapeHtml(data.excel_file || '')}<br>
          reviews.json：${escapeHtml(data.reviews_json_file || '')}<br>
          report.md：${escapeHtml(data.report_file || '')}<br>
          summary.xlsx：${escapeHtml(data.summary_excel_file || '')}
        `;

        resultBox.style.display = 'grid';
        setStatus('分析完成。');
      } catch (error) {
        setStatus(`处理失败：${error.message}`);
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
